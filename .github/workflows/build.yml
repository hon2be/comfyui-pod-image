name: Build & Push ComfyUI Pod Image

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free Disk Space
        # PyTorch 2.7 + CUDA 12.8 wheels 이 큰 편이라 · 이전 빌드가
        # `[Errno 28] No space left on device` 로 실패했음. 공격적으로 정리.
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true          # ~15GB 확보 (안 쓰는 Ruby/Node/Go/Python 툴체인)
          android: true
          dotnet: true
          haskell: true
          large-packages: true      # 대용량 apt 패키지 제거
          docker-images: true       # runner 프리인스톨 Docker 이미지 제거
          swap-storage: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
